<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Access Node</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg, #0a0000, #1a0005);
  color:#fff;
  font-family:Arial, Helvetica, sans-serif;
  overflow:hidden;
}

/* GLITCH OVERLAY */
.glitch{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#ff0000;
  opacity:0;
  pointer-events:none;
  z-index:9999;
}

.glitch.active{
  animation:glitchAnim 0.4s;
}

@keyframes glitchAnim{
  0%{opacity:0;}
  20%{opacity:0.4; transform:translate(2px, -2px);}
  40%{opacity:0.2; transform:translate(-2px, 2px);}
  60%{opacity:0.5;}
  100%{opacity:0;}
}

.container{
  width:700px;
  padding:30px;
  background:rgba(0,0,0,0.75);
  border:1px solid #3a0000;
  box-shadow:0 0 25px rgba(80,0,0,0.6);
}

h1{
  text-align:center;
  letter-spacing:2px;
  margin-bottom:20px;
}

.text{
  font-family:monospace;
  font-size:14px;
  line-height:1.7;
  color:#e6e6e6;
  white-space:pre-line;
}

.terms{
  margin-top:20px;
  padding:10px;
  border:1px solid #3a0000;
  font-size:13px;
  color:#bbb;
  font-family:monospace;
}

.checkbox{
  margin-top:15px;
  display:flex;
  align-items:center;
  gap:10px;
  font-size:13px;
}

.btn{
  margin-top:20px;
  padding:12px 25px;
  background:#2a0000;
  border:1px solid #5a0000;
  color:#fff;
  cursor:pointer;
  font-size:14px;
  letter-spacing:1px;
  transition:0.2s;
  opacity:0.5;
  pointer-events:none;
}

.btn.active{
  opacity:1;
  pointer-events:auto;
}

.btn:hover{
  background:#5a0000;
  transform:scale(1.05);
}
</style>
</head>

<body>

<div class="glitch" id="glitch"></div>

<div class="container">

<h1>SYNAPTECH ACCESS NODE</h1>

<div class="text" id="typed"></div>

<div class="terms">
TERMS OF ACCESS (SIMULATION DATA):<br><br>
- User may experience cognitive dissonance<br>
- Memory instability may occur during interaction<br>
- Emotional responses are not monitored<br>
- Exit of protocol is not guaranteed<br>
- Synaptech assumes no responsibility for perception distortion<br>
</div>

<div class="checkbox">
<input type="checkbox" id="agree" onclick="toggleBtn()">
<label for="agree">I have read and accept the terms above</label>
</div>

<button class="btn" id="btn" onclick="aceitar()">
ACEITAR
</button>

</div>

<script>
const text = `Selecione apenas indivíduos considerados capacitados e aptos a prosseguir com os enigmas subsequentes.

Não nos responsabilizamos por quaisquer danos, consequências ou efeitos decorrentes do percurso. Você está aqui por conta própria. Lembre-se disso.

Você está prestes a participar de um ARG.
Ao prosseguir, você declara ciência e aceitação dos termos abaixo.

O caminho não terá volta.`;

let i = 0;
const speed = 25;

function typeWriter(){
  if(i < text.length){
    document.getElementById("typed").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, speed);
  }
}

typeWriter();

function toggleBtn(){
  const check = document.getElementById("agree");
  const btn = document.getElementById("btn");

  if(check.checked){
    btn.classList.add("active");
  }else{
    btn.classList.remove("active");
  }
}

function aceitar(){
  const btn = document.getElementById("btn");
  const glitch = document.getElementById("glitch");

  btn.disabled = true;

  glitch.classList.add("active");

  setTimeout(() => {
    glitch.classList.remove("active");

    window.location.href = "https://wa.me/55SEUNUMEROAQUI?text=I%20accepted%20the%20protocol";

  }, 800);
}
</script>

</body>
</html>
